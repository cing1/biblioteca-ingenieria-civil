<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Biblioteca de libros de Ingeniería Civil con descargas directas" />
  <title>CING | Biblioteca</title>
  <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Variables ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:            #023047;
      --secondary:          #0abce9;
      --tertiary:           #84d8ff;
      --accent:             #ffb703;
      --accent-dark:        #fb8500;

      --bg:                 #0b0b24;
      --bg-nav:             var(--primary);
      --card-bg:            #374151;
      --bg-overlay:         rgba(11, 11, 36, 0.71);
      --card-bg-gradient:   linear-gradient(135deg, var(--primary) 0%, rgba(255,255,255,.5) 100%);
      --text:               #f3f4f6;

      --radius:             10px;
      --shadow:             0 5px 15px rgba(0,0,0,.5);
      --shadow-hover:       0 10px 30px rgba(0,0,0,0.6);

      --bg-light:           #b3b3b367;
      --card-light:         #fff;
      --card-light-bg:      linear-gradient(135deg, var(--tertiary) 0%, rgba(255,255,255,.5) 100%);
      --text-light:         #2c3e50;
      --light-secondary-text: #6b7280;

      /* Internal aliases */
      --surface:            var(--primary);
      --border:             rgba(10, 188, 233, 0.18);
      --muted:              var(--tertiary);
      --font:               'DM Sans', sans-serif;
      --mono:               'DM Mono', monospace;
      --transition:         180ms ease;
      --pdf:                #f87171;
      --zip:                var(--accent);
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ────────────────────────────────────────── */
    .page-wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .body-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 28px;
      align-items: start;
    }

    /* ── Sidebar ───────────────────────────────────────── */
    .sidebar {
      position: sticky;
      top: 24px;
      background: rgba(2, 48, 71, 0.55);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-header i {
      font-size: 1rem;
      color: var(--secondary);
    }
    .sidebar-header span {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--secondary);
    }

    .sidebar-list {
      list-style: none;
      padding: 8px 0;
      max-height: calc(100vh - 160px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(10,188,233,.2) transparent;
    }
    .sidebar-list::-webkit-scrollbar { width: 3px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: rgba(10,188,233,.25); border-radius: 99px; }

    .sidebar-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all var(--transition);
      border-left: 3px solid transparent;
      font-size: .84rem;
      color: rgba(132,216,255,.7);
    }
    .sidebar-item:hover {
      background: rgba(10,188,233,.07);
      color: var(--tertiary);
      border-left-color: rgba(10,188,233,.3);
    }
    .sidebar-item.active {
      background: rgba(255,183,3,.08);
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .sidebar-item .cat-count {
      font-family: var(--mono);
      font-size: .68rem;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(10,188,233,.1);
      color: rgba(132,216,255,.6);
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .sidebar-item.active .cat-count {
      background: rgba(255,183,3,.15);
      color: var(--accent);
    }

    /* ── Header ────────────────────────────────────────── */
    .site-header {
      padding: 48px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
      position: relative;
      text-align: center;
    }
    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 10% 50%, rgba(10,188,233,.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .site-header h1 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--secondary), var(--tertiary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .site-header p { color: var(--tertiary); font-size: .95rem; opacity: .75; }

    /* ── Controls bar ──────────────────────────────────── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
    }
    .search-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--secondary);
      font-size: 1.1rem;
      pointer-events: none;
    }
    .cat-search-wrap {
      position: relative;
      margin: 12px 16px;
    }
    .cat-search-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--secondary);
      font-size: 1rem;
      pointer-events: none;
    }
    #cat-search {
      width: 100%;
      padding: 8px 12px 8px 32px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: rgba(2, 48, 71, 0.6);
      backdrop-filter: blur(8px);
      font-family: var(--font);
      font-size: .85rem;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    #cat-search:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(10,188,233,.15);
    }
    #search {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: rgba(2, 48, 71, 0.6);
      backdrop-filter: blur(8px);
      font-family: var(--font);
      font-size: .9rem;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    #search:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(10,188,233,.15);
    }
    #search::placeholder { color: rgba(132,216,255,.45); }

    .view-toggle { display: flex; gap: 4px; flex-shrink: 0; }
    .view-btn {
      width: 34px; height: 34px;
      display: grid; place-items: center;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--tertiary);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 1.1rem;
    }
    .view-btn:hover { border-color: var(--secondary); color: var(--secondary); }
    .view-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    /* ── Results meta ──────────────────────────────────── */
    .results-meta {
      font-size: .82rem;
      color: rgba(132,216,255,.55);
      font-family: var(--mono);
      margin-bottom: 20px;
    }

    /* ── Section title ─────────────────────────────────── */
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 40px 0 16px;
    }
    .section-title h2 {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--secondary);
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-title .count {
      font-size: .72rem;
      font-family: var(--mono);
      color: var(--accent);
      background: rgba(255,183,3,.1);
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255,183,3,.25);
    }

    /* ── Grid view ─────────────────────────────────────── */
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .book-card {
      background: var(--card-bg-gradient);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition);
      display: flex;
      flex-direction: column;
    }
    .book-card:hover {
      box-shadow: var(--shadow-hover), 0 0 20px rgba(10,188,233,.12);
      transform: translateY(-3px);
      border-color: rgba(10,188,233,.45);
    }

    .book-cover {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: rgba(11,11,36,.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .book-cover .no-cover {
      font-size: 2.5rem;
      color: rgba(10,188,233,.3);
    }

    .book-info {
      padding: 10px 12px 6px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .book-title {
      font-size: .78rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .book-actions {
      display: flex;
      gap: 6px;
      padding: 8px 12px 10px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .btn-view, .btn-download {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 9px;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 500;
      text-decoration: none;
      transition: all var(--transition);
      border: 1.5px solid transparent;
    }
    .btn-view {
      border-color: var(--border);
      color: var(--tertiary);
      background: rgba(11,11,36,.3);
    }
    .btn-view:hover {
      border-color: var(--secondary);
      color: var(--secondary);
      background: rgba(10,188,233,.08);
    }
    .btn-download {
      background: var(--accent);
      color: var(--bg);
      flex: 1;
      justify-content: center;
      font-weight: 600;
    }
    .btn-download:hover { background: var(--accent-dark); }
    .btn-download .size {
      font-family: var(--mono);
      font-size: .68rem;
      opacity: .8;
      margin-left: 2px;
    }

    /* ── List view ─────────────────────────────────────── */
    .books-list { display: flex; flex-direction: column; gap: 6px; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: rgba(2,48,71,.5);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      transition: all var(--transition);
    }
    .list-item:hover {
      border-color: rgba(10,188,233,.4);
      background: rgba(2,48,71,.8);
      box-shadow: var(--shadow);
    }

    .list-icon { font-size: 1.25rem; flex-shrink: 0; }
    .list-icon.pdf { color: var(--pdf); }
    .list-icon.zip { color: var(--zip); }

    .list-title {
      font-size: .87rem;
      font-weight: 400;
      flex: 1;
      color: var(--text);
      text-decoration: none;
    }
    .list-title:hover { color: var(--secondary); }

    .list-size {
      font-family: var(--mono);
      font-size: .75rem;
      color: rgba(132,216,255,.55);
      flex-shrink: 0;
    }
    .list-dl {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 6px;
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
      font-size: .78rem;
      font-weight: 600;
      transition: background var(--transition);
      flex-shrink: 0;
    }
    .list-dl:hover { background: var(--accent-dark); }

    /* ── Loading / Error / Empty states ───────────────── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: rgba(132,216,255,.5);
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 12px; display: block; color: var(--secondary); opacity: .4; }
    .empty-state p { font-size: .95rem; }

    .loading-state {
      text-align: center;
      padding: 64px 24px;
      color: rgba(132,216,255,.6);
      font-size: .95rem;
    }
    .loading-state i {
      font-size: 2rem;
      display: block;
      margin-bottom: 12px;
      color: var(--secondary);
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      text-align: center;
      padding: 40px 24px;
      color: #f87171;
      background: rgba(248,113,113,.06);
      border: 1.5px solid rgba(248,113,113,.2);
      border-radius: var(--radius);
    }
    .error-state i { font-size: 1.8rem; display: block; margin-bottom: 10px; }
    .error-state p { font-size: .9rem; margin-bottom: 14px; }
    .error-state button {
      padding: 7px 18px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: var(--bg);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
    }
    .error-state button:hover { background: var(--accent-dark); }

    .refresh-badge {
      font-family: var(--mono);
      font-size: .72rem;
      color: rgba(132,216,255,.4);
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ── Hidden ────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 860px) {
      .body-layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
      }
      .sidebar-list {
        display: flex;
        flex-wrap: wrap;
        flex-direction: row;
        max-height: none;
        padding: 8px;
        gap: 4px;
      }
      .sidebar-item {
        border-left: none;
        border-radius: 999px;
        border: 1.5px solid var(--border);
        padding: 5px 12px;
        font-size: .78rem;
      }
      .sidebar-item.active {
        border-color: var(--accent);
      }
    }
    @media (max-width: 800px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: -220px;
        height: 100vh;
        z-index: 1000;
        transition: left 0.3s ease;
        width: 220px;
      }
      .sidebar.open {
        left: 0;
      }
      .body-layout {
        grid-template-columns: 1fr;
      }
      #btn-sidebar {
        display: block;
      }
    }
    @media (min-width: 801px) {
      #btn-sidebar {
        display: none;
      }
    }
    @media (max-width: 600px) {
      .books-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }

    /* ── Footer ────────────────────────────────────────── */
    .site-footer {
      margin-top: 60px;
      padding: 20px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: .78rem;
      color: rgba(132,216,255,.4);
      font-family: var(--mono);
      letter-spacing: .04em;
    }
    .site-footer span {
      color: rgba(132,216,255,.65);
    }
  </style>
</head>

<body>
<div class="page-wrap">

  <!-- Header -->
  <header class="site-header">
    <h1>BIBLIOTECA - INGENIERÍA CIVIL - USFX</h1>
    <p>Recopilación de libros, solucionarios y apuntes de libre acceso para estudiantes y profesionales de Ingeniería Civil</p>
  </header>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <i class="bx bx-search"></i>
      <input type="text" id="search" placeholder="Buscar por título o autor…" autocomplete="off" />
    </div>
    <span class="refresh-badge" id="refresh-badge"></span>
    <div class="view-toggle">
      <button class="view-btn" id="btn-sidebar" title="Filtrar categorías"><i class="bx bx-filter-alt"></i></button>
      <button class="view-btn active" id="btn-grid" title="Vista cuadrícula"><i class="bx bxs-grid"></i></button>
      <button class="view-btn" id="btn-list" title="Vista lista"><i class="bx bx-list-ul"></i></button>
    </div>
  </div>

  <!-- Body: sidebar + content -->
  <div class="body-layout">

    <!-- Sidebar filter -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="bx bx-filter-alt"></i>
        <span>Categorías</span>
      </div>
      <div class="cat-search-wrap">
        <i class="bx bx-search"></i>
        <input id="cat-search" type="text" placeholder="Buscar categoría..." autocomplete="off" />
      </div>
      <ul class="sidebar-list" id="sidebar-list">
        <li class="sidebar-item active" data-cat="all">
          <span>Todo</span>
          <span class="cat-count" id="count-all">…</span>
        </li>
      </ul>
    </aside>

    <!-- Main content -->
    <main>
      <div class="results-meta" id="results-meta"></div>
      <div id="library-root">
        <!-- Loading state inicial -->
        <div class="loading-state">
          <i class="bx bx-loader-alt"></i>
          Cargando biblioteca desde Google Drive…
        </div>
      </div>
    </main>

  </div><!-- /body-layout -->

  <footer class="site-footer">
    2026 - Página desarrollada por: <span>Mario Cesgo Soliz</span>
  </footer>

</div>

<script>
/* ════════════════════════════════════════════════════════
   CONFIGURACIÓN — Google Sheets API
   ════════════════════════════════════════════════════════ */
const SPREADSHEET_ID  = '1CRCyHWTi9uQSXdyjk1YL0G24Ffl92TOPhL6bz7_v9A0';
const API_KEY         = 'AIzaSyBauTLbfwaLdjOgLPHDPbD3GI1QpDXTeN8';
const SHEET_NAME      = 'Sheet1';
const SHEET_RANGE     = 'A:H';           // columnas que usa la hoja
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutos

/* ════════════════════════════════════════════════════════
   MAPEO de columnas de la hoja → campos internos
   Ajusta los nombres exactos de los encabezados de tu hoja.
   La función normalize() los convierte a minúsculas y
   compara con y sin guiones bajos, así que son tolerantes.
   ════════════════════════════════════════════════════════ */
function getField(row, ...keys) {
  for (const k of keys) {
    if (row[k] !== undefined && row[k] !== '') return row[k];
  }
  return '';
}

/* Convierte una fila cruda (objeto con encabezados como claves) en
   el objeto Book que usa el render.
   Los encabezados de la hoja son (ya en minúsculas tras el .toLowerCase()):
   "ruta de la carpeta" | "id categoría" | "nombre del archivo" |
   "id del archivo"     | "tipo de archivo" | "url del archivo"  |
   "tamaño en mb"       | "descarga directa"
*/
function rowToBook(row) {
  const title  = getField(row, 'nombre del archivo') || 'Sin nombre';
  const cat    = getField(row, 'id categoría') || 'sin-categoria';
  const size   = getField(row, 'tamaño en mb') || '';
  const fileId = getField(row, 'id del archivo');
  const dlUrl  = getField(row, 'descarga directa');
  const viewUrl= getField(row, 'url del archivo');
  const imgUrl = getField(row, 'imagen', 'img', 'portada');
  const folder = getField(row, 'ruta de la carpeta') || 'Raíz';
  const tipo   = getField(row, 'tipo de archivo') || 'pdf';

  // Construir URLs de Drive a partir del ID si no vienen completas
  const driveView = viewUrl || (fileId ? `https://drive.google.com/file/d/${fileId}/view?usp=drivesdk` : '#');
  const driveDl   = dlUrl   || (fileId ? `https://drive.google.com/uc?export=download&id=${fileId}` : '#');
  const img       = imgUrl  || (fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w400` : '');

  return {
    title,
    cat,
    size: size ? `${size}` : '',
    type: tipo.toLowerCase().includes('zip') ? 'zip' : 'pdf',
    view: driveView,
    dl:   driveDl,
    img
  };
}

/* ════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════ */
const CATEGORIES = [
  { id: 'algebra1',                  label: 'Álgebra 1' },
  { id: 'calculo1',                  label: 'Cálculo 1' },
  { id: 'fisca1',                    label: 'Física 1' },
  { id: 'Dibujo-tecnico',            label: 'Dibujo Técnico' },
  { id: 'quimica',                   label: 'Química' },
  { id: 'lab-quimica',               label: 'Laboratorio de Química Básica' },
  { id: 'calculo2',                  label: 'Cálculo 2' },
  { id: 'algebra2',                  label: 'Álgebra 2' },
  { id: 'fisica2',                   label: 'Física 2' },
  { id: 'lab-fisica2',               label: 'Laboratorio de Física 2' },
  { id: 'estructuras-isostaticas1',  label: 'Estructuras Isostáticas I' },
  { id: 'dibujo-asistido',           label: 'Diseño Asistido por Computadora' },

const CAT_LABEL = Object.fromEntries(CATEGORIES.map(c => [c.id, c.label]));

let BOOKS      = [];   // array cargado desde Sheets
let lastUpdate = null;

let state = {
  query: '',
  cat:   'all',
  view:  'grid',   // 'grid' | 'list'
  sort:  'default'
};

/* ════════════════════════════════════════════════════════
   FETCH — Google Sheets API v4
   ════════════════════════════════════════════════════════ */
async function fetchBooks() {
  try {
    const range = encodeURIComponent(`${SHEET_NAME}!${SHEET_RANGE}`);
    const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;

    const response = await fetch(url);

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();

    if (!data.values || data.values.length < 2) {
      throw new Error('La hoja está vacía o no tiene datos.');
    }

    // Primera fila = encabezados; normalizar a minúsculas
    const headers = data.values[0].map(h => h.trim().toLowerCase());

    const books = [];
    for (let i = 1; i < data.values.length; i++) {
      const rawRow = {};
      headers.forEach((h, idx) => {
        rawRow[h] = (data.values[i][idx] || '').trim();
      });

      // Saltar filas sin nombre de archivo
      if (!rawRow['nombre del archivo']) continue;

      books.push(rowToBook(rawRow));
    }

    BOOKS = books;
    lastUpdate = new Date();

    // Reconstruir sidebar con las categorías reales
    buildSidebar();
    render();

    // Actualizar badge de última carga
    document.getElementById('refresh-badge').textContent =
      `Actualizado: ${lastUpdate.toLocaleString('es-ES')}`;

  } catch (error) {
    console.error('Error fetching Google Sheets:', error);
    showError(error.message);
  }
}

/* ════════════════════════════════════════════════════════
   SIDEBAR — construido dinámicamente desde los datos
   ════════════════════════════════════════════════════════ */
function buildSidebar() {
  const sidebarList = document.getElementById('sidebar-list');

  // Limpiar ítems dinámicos previos (conservar el "Todo")
  sidebarList.querySelectorAll('.sidebar-item:not([data-cat="all"])').forEach(el => el.remove());

  CATEGORIES.forEach(cat => {
    const count = BOOKS.filter(bk => bk.cat === cat.id).length;
    const li = document.createElement('li');
    li.className = 'sidebar-item';
    li.dataset.cat = cat.id;
    li.innerHTML = `<span>${escapeHtml(cat.label)}</span><span class="cat-count">${count}</span>`;
    sidebarList.appendChild(li);
  });

  // Actualizar conteo total
  document.getElementById('count-all').textContent = BOOKS.length;
}

/* ════════════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════════════ */
function render() {
  const root = document.getElementById('library-root');
  const q    = state.query.toLowerCase().trim();

  // Filtrar
  const filtered = BOOKS.filter(bk => {
    const matchCat = state.cat === 'all' || bk.cat === state.cat;
    const matchQ   = !q || bk.title.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  // Ordenar
  if (state.sort === 'title') filtered.sort((a, b) => a.title.localeCompare(b.title, 'es'));
  if (state.sort === 'size')  filtered.sort((a, b) => parseFloat(a.size) - parseFloat(b.size));

  // Meta
  document.getElementById('results-meta').textContent =
    `${filtered.length} archivo${filtered.length !== 1 ? 's' : ''} encontrado${filtered.length !== 1 ? 's' : ''}`;

  // Agrupar por categoría
  const groups = {};
  filtered.forEach(bk => {
    if (!groups[bk.cat]) groups[bk.cat] = [];
    groups[bk.cat].push(bk);
  });

  if (filtered.length === 0) {
    root.innerHTML = `<div class="empty-state">
      <i class="bx bx-book-open"></i>
      <p>No se encontraron archivos${q ? ` para "<strong>${escapeHtml(q)}</strong>"` : '.'}</p>
    </div>`;
    return;
  }

  const activeCats = state.cat === 'all'
    ? CATEGORIES.filter(c => groups[c.id])
    : CATEGORIES.filter(c => c.id === state.cat && groups[c.id]);

  let html = '';
  activeCats.forEach(cat => {
    const books = groups[cat.id] || [];
    if (!books.length) return;
    html += `
      <div class="section-title">
        <h2>${escapeHtml(cat.label)}</h2>
        <span class="count">${books.length}</span>
      </div>
      <div class="${state.view === 'grid' ? 'books-grid' : 'books-list'}">
        ${books.map(bk => state.view === 'grid' ? cardGrid(bk) : cardList(bk)).join('')}
      </div>`;
  });

  root.innerHTML = html;
}

function cardGrid(bk) {
  const icon = bk.type === 'zip' ? 'bxs-file-archive' : 'bxs-file-pdf';
  return `
    <article class="book-card">
      <a href="${escapeHtml(bk.view)}" target="_blank" rel="noopener" title="${escapeHtml(bk.title)}">
        <div class="book-cover">
          <img loading="lazy" src="${escapeHtml(bk.img)}" alt="${escapeHtml(bk.title)}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <span class="no-cover" style="display:none"><i class="bx ${icon}"></i></span>
        </div>
        <div class="book-info">
          <p class="book-title">${escapeHtml(bk.title)}</p>
        </div>
      </a>
      <div class="book-actions">
        <a class="btn-view" href="${escapeHtml(bk.view)}" target="_blank" rel="noopener">
          <i class="bx bx-expand-alt"></i> Ver
        </a>
        <a class="btn-download" href="${escapeHtml(bk.dl)}" download>
          <i class="bx bx-cloud-download"></i>
          ${bk.size ? `<span class="size">${escapeHtml(bk.size)} MB</span>` : ''}
        </a>
      </div>
    </article>`;
}

function cardList(bk) {
  const isPdf = bk.type === 'pdf';
  return `
    <div class="list-item">
      <i class="bx ${isPdf ? 'bxs-file-pdf' : 'bxs-file-archive'} list-icon ${bk.type}"></i>
      <a class="list-title" href="${escapeHtml(bk.view)}" target="_blank" rel="noopener">${escapeHtml(bk.title)}</a>
      <span class="list-size">${escapeHtml(bk.size)}${bk.size ? ' MB' : ''}</span>
      <a class="list-dl" href="${escapeHtml(bk.dl)}" download>
        <i class="bx bx-cloud-download"></i> Descargar
      </a>
    </div>`;
}

/* ════════════════════════════════════════════════════════
   ERROR STATE
   ════════════════════════════════════════════════════════ */
function showError(msg) {
  const root = document.getElementById('library-root');
  root.innerHTML = `
    <div class="error-state">
      <i class="bx bx-error-circle"></i>
      <p><strong>Error al cargar los datos</strong><br><small>${escapeHtml(msg)}</small></p>
      <button onclick="fetchBooks()"><i class="bx bx-refresh"></i> Reintentar</button>
    </div>`;
}

/* ════════════════════════════════════════════════════════
   UTIL
   ════════════════════════════════════════════════════════ */
function escapeHtml(text) {
  if (!text) return '';
  const d = document.createElement('div');
  d.textContent = String(text);
  return d.innerHTML;
}

/* ════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════ */
function init() {
  const sidebarList = document.getElementById('sidebar-list');

  // Sidebar: delegación de eventos (funciona también para ítems añadidos dinámicamente)
  sidebarList.addEventListener('click', e => {
    const item = e.target.closest('.sidebar-item');
    if (!item) return;
    sidebarList.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    state.cat = item.dataset.cat;
    render();
  });

  // Búsqueda en categorías del sidebar
  document.getElementById('cat-search').addEventListener('input', e => {
    const query = e.target.value.trim().toLowerCase();
    sidebarList.querySelectorAll('.sidebar-item').forEach(item => {
      const label = item.querySelector('span').textContent.toLowerCase();
      item.style.display = label.includes(query) ? '' : 'none';
    });
    const activeItem = sidebarList.querySelector('.sidebar-item.active');
    if (activeItem && activeItem.style.display === 'none') {
      state.cat = 'all';
      sidebarList.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
      const allItem = sidebarList.querySelector('.sidebar-item[data-cat="all"]');
      if (allItem) allItem.classList.add('active');
      render();
    }
  });

  // Búsqueda principal — debounced
  let searchTimer;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.query = e.target.value;
      render();
    }, 180);
  });

  // Toggles de vista
  document.getElementById('btn-grid').addEventListener('click', () => {
    state.view = 'grid';
    document.getElementById('btn-grid').classList.add('active');
    document.getElementById('btn-list').classList.remove('active');
    render();
  });
  document.getElementById('btn-list').addEventListener('click', () => {
    state.view = 'list';
    document.getElementById('btn-list').classList.add('active');
    document.getElementById('btn-grid').classList.remove('active');
    render();
  });

  // Toggle sidebar móvil
  document.getElementById('btn-sidebar').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.toggle('open');
  });

  // Carga inicial
  fetchBooks();

  // Refresco automático cada 5 minutos
  setInterval(fetchBooks, REFRESH_INTERVAL);

  // Refrescar al volver a la pestaña
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) fetchBooks();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
